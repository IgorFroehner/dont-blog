server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Inject analytics snippet into HTML responses (no-op if ANALYTICS_ID is unset)
    sub_filter '</head>' '<script defer src="${ANALYTICS_SCRIPT_URL}" data-website-id="${ANALYTICS_ID}"></script></head>';
    sub_filter_once on;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache HTML (ensures users get fresh deploys)
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
