{{define "content"}}
<div class="mb-6">
    <h1 class="text-2xl font-bold">Posts tagged "{{.ActiveTag}}"</h1>
    <a href="/blog" class="text-sm text-gray-500 dark:text-gray-400 hover:text-accent dark:hover:text-accent-dark">&larr; All posts</a>
</div>

<div class="space-y-6">
    {{range .Posts}}
    <article>
        <div class="flex flex-col sm:flex-row sm:items-baseline sm:gap-4">
            <time datetime="{{.Date.Format "2006-01-02"}}" class="text-sm text-gray-500 dark:text-gray-400 shrink-0">{{.Date.Format "Jan 2, 2006"}}</time>
            <h2 class="text-lg font-medium">
                <a href="/blog/{{.Slug}}" class="text-accent dark:text-accent-dark hover:underline">{{.Title}}</a>
            </h2>
        </div>
        <div class="flex flex-wrap gap-1.5 mt-1.5 ml-0 sm:ml-[calc(5rem+1rem)]">
            {{range .Tags}}
            <a href="/blog/tag/{{.}}" class="text-xs px-2 py-0.5 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">{{.}}</a>
            {{end}}
        </div>
        {{if .Excerpt}}
        <p class="text-sm text-gray-600 dark:text-gray-400 mt-1.5 ml-0 sm:ml-[calc(5rem+1rem)]">{{.Excerpt}}</p>
        {{end}}
    </article>
    {{end}}
</div>
{{end}}
