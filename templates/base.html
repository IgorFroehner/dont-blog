<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{if .PageTitle}}{{.PageTitle}} — {{end}}{{.Site.Title}}</title>
    <meta name="description" content="{{if .PageDescription}}{{.PageDescription}}{{else}}{{.Site.Description}}{{end}}">
    <meta name="author" content="{{.Site.Author}}">
    {{if .CanonicalURL}}<link rel="canonical" href="{{.CanonicalURL}}">{{end}}

    <!-- Open Graph -->
    <meta property="og:title" content="{{if .PageTitle}}{{.PageTitle}}{{else}}{{.Site.Title}}{{end}}">
    <meta property="og:description" content="{{if .PageDescription}}{{.PageDescription}}{{else}}{{.Site.Description}}{{end}}">
    <meta property="og:type" content="{{if .IsPost}}article{{else}}website{{end}}">
    {{if .CanonicalURL}}<meta property="og:url" content="{{.CanonicalURL}}">{{end}}

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

    <!-- RSS -->
    <link rel="alternate" type="application/rss+xml" title="{{.Site.Title}}" href="/feed.xml">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Tailwind CDN with Typography plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    },
                    colors: {
                        accent: {
                            DEFAULT: '#2563eb',
                            dark: '#60a5fa',
                        },
                    },
                    typography: {
                        DEFAULT: {
                            css: {
                                maxWidth: '700px',
                                lineHeight: '1.75',
                                fontSize: '1.125rem',
                            },
                        },
                    },
                },
            },
        }
    </script>

    <!-- FOUC prevention: set dark mode before render -->
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <style>
        html { transition: background-color 0.2s ease, color 0.2s ease; }

        /* Chroma syntax highlighting — light (One Light inspired) */
        .chroma { background: #fafafa; border-radius: 0.5rem; padding: 1rem; overflow-x: auto; font-size: 0.875rem; color: #383a42; }
        .chroma .ln { color: #9d9d9f; margin-right: 0.75em; }
        .chroma .k, .chroma .kd, .chroma .kn, .chroma .kp, .chroma .kr, .chroma .kt { color: #a626a4; font-weight: 600; }
        .chroma .kc { color: #0184bc; font-weight: 600; }
        .chroma .n, .chroma .no, .chroma .ni, .chroma .ne, .chroma .nn { color: #383a42; }
        .chroma .na, .chroma .nb, .chroma .nc, .chroma .nf { color: #4078f2; }
        .chroma .nd { color: #a626a4; }
        .chroma .nv, .chroma .nx { color: #e45649; }
        .chroma .s, .chroma .s1, .chroma .s2, .chroma .sb, .chroma .sh, .chroma .sx { color: #50a14f; }
        .chroma .sa, .chroma .sc, .chroma .dl, .chroma .se { color: #50a14f; }
        .chroma .sr { color: #0184bc; }
        .chroma .si { color: #ca1243; }
        .chroma .c, .chroma .c1, .chroma .ch, .chroma .cm, .chroma .cs { color: #a0a1a7; font-style: italic; }
        .chroma .cp, .chroma .cpf { color: #a0a1a7; }
        .chroma .m, .chroma .mb, .chroma .mf, .chroma .mh, .chroma .mi, .chroma .il, .chroma .mo { color: #986801; }
        .chroma .o, .chroma .ow { color: #a626a4; }
        .chroma .p { color: #383a42; }
        .chroma .ge { font-style: italic; }
        .chroma .gs { font-weight: 700; }

        /* Chroma syntax highlighting — dark (Catppuccin Mocha) */
        .dark .chroma { background: #1e1e2e; color: #cdd6f4; }
        .dark .chroma .ln { color: #585b70; }
        .dark .chroma .k, .dark .chroma .kd, .dark .chroma .kn, .dark .chroma .kp, .dark .chroma .kr, .dark .chroma .kt { color: #cba6f7; font-weight: 600; }
        .dark .chroma .kc { color: #fab387; font-weight: 600; }
        .dark .chroma .n, .dark .chroma .no, .dark .chroma .ni, .dark .chroma .ne, .dark .chroma .nn { color: #cdd6f4; }
        .dark .chroma .na, .dark .chroma .nb, .dark .chroma .nc, .dark .chroma .nf { color: #89b4fa; }
        .dark .chroma .nd { color: #cba6f7; }
        .dark .chroma .nv, .dark .chroma .nx { color: #f38ba8; }
        .dark .chroma .s, .dark .chroma .s1, .dark .chroma .s2, .dark .chroma .sb, .dark .chroma .sh, .dark .chroma .sx { color: #a6e3a1; }
        .dark .chroma .sa, .dark .chroma .sc, .dark .chroma .dl, .dark .chroma .se { color: #a6e3a1; }
        .dark .chroma .sr { color: #89dceb; }
        .dark .chroma .si { color: #f38ba8; }
        .dark .chroma .c, .dark .chroma .c1, .dark .chroma .ch, .dark .chroma .cm, .dark .chroma .cs { color: #6c7086; font-style: italic; }
        .dark .chroma .cp, .dark .chroma .cpf { color: #6c7086; }
        .dark .chroma .m, .dark .chroma .mb, .dark .chroma .mf, .dark .chroma .mh, .dark .chroma .mi, .dark .chroma .il, .dark .chroma .mo { color: #fab387; }
        .dark .chroma .o, .dark .chroma .ow { color: #89dceb; }
        .dark .chroma .p { color: #cdd6f4; }

        /* Inline code */
        :not(pre) > code {
            background: #f1f5f9;
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            font-size: 0.875em;
        }
        .dark :not(pre) > code {
            background: #1e293b;
        }
    </style>
</head>
<body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col font-sans">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 bg-accent text-white px-4 py-2 rounded z-50">Skip to content</a>

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-950/80 backdrop-blur-sm border-b border-gray-200 dark:border-gray-800">
        <nav class="max-w-3xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <a href="/" class="text-lg font-semibold hover:text-accent dark:hover:text-accent-dark transition-colors">
                {{.Site.Title}}
            </a>

            <!-- Desktop nav -->
            <div class="hidden sm:flex items-center gap-6">
                <a href="/" class="text-sm font-medium hover:text-accent dark:hover:text-accent-dark transition-colors{{if eq .CurrentPath "/"}} text-accent dark:text-accent-dark{{end}}">About</a>
                <a href="/blog" class="text-sm font-medium hover:text-accent dark:hover:text-accent-dark transition-colors{{if eq .CurrentPath "/blog"}} text-accent dark:text-accent-dark{{end}}">Blog</a>
                <a href="/projects" class="text-sm font-medium hover:text-accent dark:hover:text-accent-dark transition-colors{{if eq .CurrentPath "/projects"}} text-accent dark:text-accent-dark{{end}}">Projects</a>
                <button id="theme-toggle" aria-label="Toggle dark mode" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <span class="hidden dark:block">{{template "icon-sun"}}</span>
                    <span class="block dark:hidden">{{template "icon-moon"}}</span>
                </button>
            </div>

            <!-- Mobile nav toggle -->
            <div class="flex items-center gap-2 sm:hidden">
                <button id="theme-toggle-mobile" aria-label="Toggle dark mode" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <span class="hidden dark:block">{{template "icon-sun"}}</span>
                    <span class="block dark:hidden">{{template "icon-moon"}}</span>
                </button>
                <button id="menu-toggle" aria-label="Toggle menu" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    {{template "icon-menu"}}
                </button>
            </div>
        </nav>

        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden sm:hidden border-t border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-950">
            <div class="px-4 py-3 space-y-2">
                <a href="/" class="block py-2 text-sm font-medium hover:text-accent dark:hover:text-accent-dark">About</a>
                <a href="/blog" class="block py-2 text-sm font-medium hover:text-accent dark:hover:text-accent-dark">Blog</a>
                <a href="/projects" class="block py-2 text-sm font-medium hover:text-accent dark:hover:text-accent-dark">Projects</a>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main id="main-content" class="flex-1 max-w-3xl w-full mx-auto px-4 sm:px-6 py-8 sm:py-12">
        {{block "content" .}}{{end}}
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-200 dark:border-gray-800">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between text-sm text-gray-500 dark:text-gray-400">
            <p>&copy; {{.Year}} {{.Site.Author}}. All rights reserved.</p>
            {{with index .Site.Social "GitHub"}}<a href="{{.}}" target="_blank" rel="noopener noreferrer" class="hover:text-accent dark:hover:text-accent-dark transition-colors" aria-label="GitHub">{{template "icon-github"}}</a>{{end}}
        </div>
    </footer>

    <script src="/static/js/app.js" defer></script>
</body>
</html>
